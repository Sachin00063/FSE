name: Uses action

on:
  push:

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: create a file   # clone the repo
        run: echo "Hello world" > file.txt
      - name: upload on artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-file
          path: file.txt
          
  job2:
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: download a file
        uses: actions/download-artifact@v4
        with:
          name: my-file

      #add a step to read file.txt
      - name: read file.txt
        run: cat file.txt

  # --- NEW JOB ADDED FOR LINTING AND TESTING ---
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      # 1. This pulls your code from your GitHub repo into the Action
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. This installs Node.js so it understands npm commands
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 

      # 3. This installs your project's dependencies
      - name: Install dependencies
        run: npm install

      # 4. Runs your safe linting script from package.json
      - name: Run ESLint
        run: npm run lint

      # 5. Runs your safe testing script from package.json
      - name: Run Tests
        run: npm run test
